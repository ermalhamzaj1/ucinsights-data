name: Refresh Reddit discussions

on:
  schedule:
    - cron: "0 5 * * *" # daily at 05:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # No credentials/deps needed — the script scrapes old.reddit's HTML.
      # If GitHub's datacenter IPs ever start getting 403'd, the job fails
      # without overwriting data; run `npm run fetch` locally and commit.
      - name: Fetch discussions
        run: node scripts/fetch-reddit.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/discussions.json; then
            echo "No changes."
          else
            git add data/discussions.json
            git commit -m "chore: refresh discussions ($(date -u +%Y-%m-%d))"
            git push
          fi
